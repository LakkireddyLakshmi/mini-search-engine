<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Search Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #8b5cf6; --accent2: #6366f1; --bg: #0b0b12; --card: #15151f;
      --line: #262636; --muted: #8a90a6; --text: #e9e9f2;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; justify-content: center; padding: 7vh 18px 40px;
      /* soft glow behind the hero */
      background-image:
        radial-gradient(60% 40% at 50% 0%, rgba(139,92,246,.16), transparent 70%),
        radial-gradient(40% 30% at 85% 10%, rgba(99,102,241,.10), transparent 70%);
    }
    .wrap { width: 100%; max-width: 760px; }

    /* ---- hero ---- */
    .hero { text-align: center; margin-bottom: 30px; }
    .logo { font-size: 2.6rem; line-height: 1; }
    h1 {
      font-size: 2.2rem; font-weight: 800; letter-spacing: -.02em; margin: 10px 0 6px;
      background: linear-gradient(90deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tag { color: var(--muted); margin: 0; font-size: 1rem; }

    /* ---- stat pills ---- */
    .stats { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 18px 0 4px; }
    .stat {
      font-size: .78rem; font-weight: 600; color: #c9ccdd; padding: 6px 12px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.02);
    }
    .stat b { color: var(--accent); }

    /* ---- search ---- */
    .searchbox { position: relative; margin-top: 26px; }
    .searchbox .ico { position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; opacity: .7; pointer-events: none; }
    input {
      width: 100%; padding: 16px 18px 16px 50px; font-size: 1.05rem; border-radius: 14px;
      border: 1px solid var(--line); background: var(--card); color: #fff; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: #6b7088; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139,92,246,.15); }
    .suggest {
      position: absolute; left: 0; right: 0; top: 62px; background: var(--card);
      border: 1px solid var(--line); border-radius: 14px; overflow: hidden; z-index: 5;
      box-shadow: 0 12px 30px rgba(0,0,0,.4);
    }
    .suggest div { padding: 11px 18px; cursor: pointer; font-size: .95rem; }
    .suggest div:hover { background: #20202f; color: #fff; }

    /* ---- results ---- */
    .results { margin-top: 26px; display: flex; flex-direction: column; gap: 14px; }
    .hit {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px;
      cursor: pointer; transition: border-color .15s, transform .12s; animation: rise .25s ease;
    }
    .hit:hover { border-color: var(--accent); transform: translateY(-1px); }
    .hit h3 { margin: 0 0 6px; font-size: 1.12rem; }
    .hit .score {
      float: right; color: #fff; background: linear-gradient(90deg, var(--accent), var(--accent2));
      font-size: .72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    }
    .hit p { margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.55; }
    .empty { color: var(--muted); margin-top: 22px; font-size: .95rem; }

    /* ---- article view ---- */
    .article { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 26px; animation: rise .25s ease; }
    .article h2 { margin: 0 0 14px; font-size: 1.5rem; }
    .article p { margin: 0; color: #d6d8e6; line-height: 1.75; font-size: 1.02rem; }
    .back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px;
      color: var(--accent); cursor: pointer; font-size: .9rem; font-weight: 600; }
    .back:hover { text-decoration: underline; }

    /* ---- topics ---- */
    .topics { margin-top: 26px; }
    .topics .label { color: var(--muted); font-size: .9rem; margin-bottom: 12px; }
    .chips { display: flex; flex-wrap: wrap; gap: 9px; }
    .chip {
      padding: 7px 14px; border-radius: 999px; cursor: pointer; font-size: .86rem; font-weight: 500;
      background: var(--card); border: 1px solid var(--line); color: #d3d6e6;
      transition: border-color .15s, color .15s, background .15s;
    }
    .chip:hover { border-color: var(--accent); color: #fff; background: rgba(139,92,246,.12); }

    /* ---- footer ---- */
    footer { text-align: center; margin-top: 46px; color: #5f667d; font-size: .82rem; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="logo">🔎</div>
      <h1>Mini Search Engine</h1>
      <p class="tag">Full-text search over <b>5,000 Wikipedia articles</b> — inverted index, BM25 &amp; trie, hand-written from scratch.</p>
      <div class="stats" id="stats">
        <span class="stat">Inverted index</span>
        <span class="stat">BM25 ranking</span>
        <span class="stat">Trie autocomplete</span>
        <span class="stat"><b>0</b> search libraries</span>
      </div>
    </div>

    <div class="searchbox">
      <span class="ico">🔍</span>
      <input id="q" type="text" placeholder="Search… try &quot;inverted index&quot; or &quot;sorting&quot;" autocomplete="off" />
      <div id="suggest" class="suggest" style="display:none"></div>
    </div>

    <div id="results" class="results"></div>
    <div id="topics" class="topics"></div>

    <footer>
      Hand-written inverted index, BM25 &amp; trie ·
      <a href="https://github.com/LakkireddyLakshmi/mini-search-engine" target="_blank" rel="noopener">source on GitHub ↗</a>
    </footer>
  </div>

  <script>
    const q = document.getElementById("q");
    const suggestBox = document.getElementById("suggest");
    const results = document.getElementById("results");
    const topicsBox = document.getElementById("topics");

    // Recognisable example queries that all return good hits in the corpus.
    const EXAMPLES = [
      "Albert Einstein", "gravity", "World War", "Solar System", "volcano",
      "Python", "democracy", "photosynthesis", "Shakespeare", "dinosaur",
      "Olympic Games", "black hole",
    ];

    function renderExamples(label) {
      topicsBox.innerHTML =
        `<div class="label">${label}</div><div class="chips">` +
        EXAMPLES.map(t => `<span class="chip">${t}</span>`).join("") +
        `</div>`;
      [...topicsBox.querySelectorAll(".chip")].forEach(el => el.onclick = () => {
        q.value = el.textContent; runSearch();
      });
    }

    async function loadStats() {
      try {
        const s = await (await fetch("/api/stats")).json();
        const box = document.getElementById("stats");
        const pills =
          `<span class="stat"><b>${s.documents.toLocaleString()}</b> documents</span>` +
          `<span class="stat"><b>${s.terms.toLocaleString()}</b> unique terms</span>`;
        box.insertAdjacentHTML("afterbegin", pills);
      } catch (_) { /* keep static pills if stats fail */ }
    }

    async function openDocument(title) {
      suggestBox.style.display = "none";
      topicsBox.innerHTML = "";
      const res = await fetch(`/api/document?title=${encodeURIComponent(title)}`);
      if (!res.ok) { results.innerHTML = `<p class="empty">Couldn't open “${title}”.</p>`; return; }
      const doc = await res.json();
      results.innerHTML = `
        <span class="back" id="back">← back to search</span>
        <div class="article">
          <h2>${doc.title}</h2>
          <p>${doc.text}</p>
        </div>`;
      document.getElementById("back").onclick = () => {
        results.innerHTML = ""; q.value = "";
        renderExamples("Try a search:");
      };
    }

    async function runSearch() {
      suggestBox.style.display = "none";
      const term = q.value.trim();
      if (!term) { results.innerHTML = ""; renderExamples("Try a search:"); return; }
      const res = await fetch(`/api/search?q=${encodeURIComponent(term)}`);
      const data = await res.json();
      if (!data.results.length) {
        results.innerHTML = `<p class="empty">No results for “${term}”. Try one of these:</p>`;
        renderExamples("");
        return;
      }
      topicsBox.innerHTML = "";
      results.innerHTML = data.results.map(r => `
        <div class="hit" data-title="${r.title.replace(/"/g, "&quot;")}">
          <span class="score">${r.score.toFixed(2)}</span>
          <h3>${r.title}</h3>
          <p>${r.snippet}</p>
        </div>`).join("");
      [...results.querySelectorAll(".hit")].forEach(el => el.onclick = () => {
        openDocument(el.dataset.title);
      });
    }

    async function runSuggest() {
      const term = q.value.trim();
      const last = term.split(/\s+/).pop();
      if (last.length < 2) { suggestBox.style.display = "none"; return; }
      const res = await fetch(`/api/autocomplete?q=${encodeURIComponent(last)}`);
      const data = await res.json();
      if (!data.suggestions.length) { suggestBox.style.display = "none"; return; }
      suggestBox.innerHTML = data.suggestions.map(s => `<div>${s}</div>`).join("");
      suggestBox.style.display = "block";
      [...suggestBox.children].forEach(el => el.onclick = () => {
        const parts = term.split(/\s+/); parts[parts.length - 1] = el.textContent;
        q.value = parts.join(" ") + " "; suggestBox.style.display = "none"; q.focus();
      });
    }

    q.addEventListener("input", runSuggest);
    q.addEventListener("keydown", e => { if (e.key === "Enter") runSearch(); });
    document.addEventListener("click", e => {
      if (!suggestBox.contains(e.target) && e.target !== q) suggestBox.style.display = "none";
    });

    loadStats();
    renderExamples("Try a search:");
  </script>
</body>
</html>
